
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#009ED6" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/manifest.json" />
    <link id="favicon" rel="icon" href="https://iili.io/fsmAapV.png" />
    <link rel="apple-touch-icon" href="https://iili.io/fsmAapV.png" />
    <title>LOGISTIC_PRO1</title>
    <script>
      window.global = window;
      window.process = {
        env: { DEBUG: undefined, NODE_DEBUG: undefined, NODE_ENV: 'development' },
        browser: true,
        version: '',
        nextTick: function(fn) { setTimeout(fn, 0); }
      };
    </script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS para soporte de Excel .xlsx -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <!-- html2pdf.js para descarga automática de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-color: #009ED6;
        --secondary-color: #82BD02;
      }
      
      body { 
        font-family: 'Inter', sans-serif; 
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
      
      /* Dark mode scrollbar */
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }

      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in { animation: scale-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .animate-blink { animation: blink 1s infinite; }

      @keyframes bell-shake {
        0%, 100% { transform: rotate(0); }
        20% { transform: rotate(15deg); }
        40% { transform: rotate(-15deg); }
        60% { transform: rotate(10deg); }
        80% { transform: rotate(-10deg); }
      }
      .animate-bell-shake {
        animation: bell-shake 0.5s ease-in-out infinite;
        transform-origin: top center;
      }

      @media print {
        html, body, #root {
          height: auto !important;
          overflow: visible !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .no-print { display: none !important; }
        .print-only { 
          display: block !important; 
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          z-index: 9999 !important;
        }
      }
      
      html, body { 
        overscroll-behavior-y: none; 
        height: 100%;
        overflow: hidden;
      }
      
      .dark {
        background-color: #0f172a;
        color: #f1f5f9;
      }
      
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body class="bg-indigo-50/30 text-slate-900 transition-colors duration-300">
    <div id="root" class="h-screen w-screen overflow-hidden flex flex-col"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
